<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>SkyPulse — Dashboard</title>
  <link rel="stylesheet" href="style.css"/>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:ital,wght@0,300;0,400;0,500;1,300&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"/>
</head>
<body class="app-page">

  <!-- SIDEBAR -->
  <aside class="sidebar" id="sidebar">
    <div class="sidebar-brand">
      <i class="fa-solid fa-cloud-sun-rain"></i>
      <span>SkyPulse</span>
    </div>
    <nav class="sidebar-nav">
      <a href="dashboard.html" class="nav-link active"><i class="fa-solid fa-gauge-high"></i> Dashboard</a>
      <a href="map.html" class="nav-link"><i class="fa-solid fa-map-location-dot"></i> Weather Map</a>
      <a href="history.html" class="nav-link"><i class="fa-solid fa-clock-rotate-left"></i> Search History</a>
      <a href="compare.html" class="nav-link"><i class="fa-solid fa-code-compare"></i> Compare Cities</a>
    </nav>
    <div class="sidebar-footer">
      <div class="user-badge" id="sidebarUser"></div>
      <button class="btn-logout" onclick="logout()"><i class="fa-solid fa-right-from-bracket"></i> Logout</button>
    </div>
  </aside>

  <!-- MAIN CONTENT -->
  <main class="main-content">

    <!-- TOP BAR -->
    <header class="topbar">
      <button class="hamburger" onclick="toggleSidebar()"><i class="fa-solid fa-bars"></i></button>
      <div class="topbar-search">
        <i class="fa-solid fa-magnifying-glass"></i>
        <input type="text" id="city" placeholder="Search any city..." onkeydown="if(event.key==='Enter') getWeather()"/>
        <button onclick="getWeather()" class="search-btn">Search</button>
      </div>
      <div class="topbar-right">
        <button class="icon-btn" onclick="getLocationWeather()" title="Use my location">
          <i class="fa-solid fa-location-crosshairs"></i>
        </button>
        <button class="icon-btn" onclick="toggleUnit()" id="unitToggle" title="Toggle °C/°F">°C</button>
        <div class="avatar" id="topbarAvatar"></div>
      </div>
    </header>

    <!-- LOADING STATE -->
    <div class="loading-overlay hidden" id="loadingOverlay">
      <div class="loader-ring"></div>
      <p>Fetching weather data...</p>
    </div>

    <!-- WELCOME / EMPTY STATE -->
    <section class="welcome-state" id="welcomeState">
      <div class="welcome-art">
        <i class="fa-solid fa-cloud-sun"></i>
      </div>
      <h2>Good <span id="timeGreeting"></span>!</h2>
      <p>Search for a city to get live weather, 5-day forecast, air quality, and more.</p>
      <div class="quick-cities">
        <span>Popular:</span>
        <button onclick="quickSearch('London')">London</button>
        <button onclick="quickSearch('Tokyo')">Tokyo</button>
        <button onclick="quickSearch('New York')">New York</button>
        <button onclick="quickSearch('Mumbai')">Mumbai</button>
        <button onclick="quickSearch('Sydney')">Sydney</button>
      </div>
    </section>

    <!-- WEATHER RESULTS (hidden by default) -->
    <div class="results-grid hidden" id="resultsGrid">

      <!-- HERO CARD -->
      <div class="hero-card card" id="heroCard">
        <div class="hero-left">
          <div class="hero-location" id="heroLocation"></div>
          <div class="hero-temp" id="heroTemp"></div>
          <div class="hero-desc" id="heroDesc"></div>
          <div class="hero-meta" id="heroMeta"></div>
        </div>
        <div class="hero-right">
          <img id="heroIcon" src="" alt="weather icon"/>
          <div class="hero-stats" id="heroStats"></div>
        </div>
      </div>

      <!-- AIR QUALITY CARD -->
      <div class="card aq-card" id="aqCard">
        <h3 class="card-title"><i class="fa-solid fa-wind"></i> Air Quality Index</h3>
        <div class="aqi-display" id="aqiDisplay"></div>
      </div>

      <!-- UV INDEX CARD -->
      <div class="card uv-card">
        <h3 class="card-title"><i class="fa-solid fa-sun"></i> UV Index</h3>
        <div class="uv-display" id="uvDisplay"></div>
      </div>

      <!-- SUNRISE / SUNSET CARD -->
      <div class="card sun-card">
        <h3 class="card-title"><i class="fa-solid fa-circle-half-stroke"></i> Sun</h3>
        <div class="sun-display" id="sunDisplay"></div>
      </div>

      <!-- 5-DAY FORECAST -->
      <div class="card forecast-card">
        <h3 class="card-title"><i class="fa-solid fa-calendar-days"></i> 5-Day Forecast</h3>
        <div class="forecast-row" id="weeklyForecast"></div>
      </div>

      <!-- HOURLY CHART -->
      <div class="card chart-card">
        <h3 class="card-title"><i class="fa-solid fa-chart-line"></i> 24-Hour Temperature</h3>
        <canvas id="tempChart" height="100"></canvas>
      </div>

      <!-- HUMIDITY + WIND -->
      <div class="card detail-card">
        <h3 class="card-title"><i class="fa-solid fa-droplet"></i> Humidity & Wind</h3>
        <div class="detail-grid" id="detailGrid"></div>
      </div>

    </div>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <script src="auth.js"></script>
  <script src="dashboard.js"></script>
  <script src="app.js"></script>
</body>
</html>
