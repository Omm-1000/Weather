<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>SkyPulse — Search History</title>
  <link rel="stylesheet" href="style.css"/>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:ital,wght@0,300;0,400;0,500;1,300&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"/>
</head>
<body class="app-page">

  <aside class="sidebar" id="sidebar">
    <div class="sidebar-brand"><i class="fa-solid fa-cloud-sun-rain"></i><span>SkyPulse</span></div>
    <nav class="sidebar-nav">
      <a href="dashboard.html" class="nav-link"><i class="fa-solid fa-gauge-high"></i> Dashboard</a>
      <a href="map.html" class="nav-link"><i class="fa-solid fa-map-location-dot"></i> Weather Map</a>
      <a href="history.html" class="nav-link active"><i class="fa-solid fa-clock-rotate-left"></i> Search History</a>
      <a href="compare.html" class="nav-link"><i class="fa-solid fa-code-compare"></i> Compare Cities</a>
    </nav>
    <div class="sidebar-footer">
      <div class="user-badge" id="sidebarUser"></div>
      <button class="btn-logout" onclick="logout()"><i class="fa-solid fa-right-from-bracket"></i> Logout</button>
    </div>
  </aside>

  <main class="main-content">
    <header class="topbar">
      <button class="hamburger" onclick="toggleSidebar()"><i class="fa-solid fa-bars"></i></button>
      <h2 class="page-title">Search History</h2>
      <div class="topbar-right">
        <button class="btn-danger-sm" onclick="clearHistory()"><i class="fa-solid fa-trash"></i> Clear All</button>
        <div class="avatar" id="topbarAvatar"></div>
      </div>
    </header>

    <section class="history-section">
      <div class="history-stats" id="historyStats"></div>
      <div class="history-filter">
        <input type="text" id="historySearch" placeholder="Filter by city..." oninput="filterHistory()"/>
        <select id="historySort" onchange="filterHistory()">
          <option value="newest">Newest First</option>
          <option value="oldest">Oldest First</option>
          <option value="az">A → Z</option>
        </select>
      </div>
      <div class="history-grid" id="historyGrid"></div>
      <div class="empty-state hidden" id="historyEmpty">
        <i class="fa-solid fa-clock-rotate-left"></i>
        <p>No history found.</p>
      </div>
    </section>
  </main>

  <script src="auth.js"></script>
  <script src="history.js"></script>
</body>
</html>
