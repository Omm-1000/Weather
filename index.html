<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>SkyPulse — Login</title>
  <link rel="stylesheet" href="style.css" />
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:ital,wght@0,300;0,400;0,500;1,300&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"/>
</head>
<body class="auth-page">

  <div class="bg-orbs">
    <div class="orb orb1"></div>
    <div class="orb orb2"></div>
    <div class="orb orb3"></div>
  </div>

  <div class="auth-wrapper">
    <div class="auth-card">
      <div class="auth-brand">
        <div class="brand-icon"><i class="fa-solid fa-cloud-sun-rain"></i></div>
        <h1>SkyPulse</h1>
        <p class="brand-tagline">Real-time weather intelligence</p>
      </div>

      <div class="tab-switcher">
        <button class="tab-btn active" onclick="showTab('login')">Sign In</button>
        <button class="tab-btn" onclick="showTab('signup')">Sign Up</button>
        <div class="tab-indicator"></div>
      </div>

      <!-- LOGIN FORM -->
      <form id="loginTab" class="auth-form active" onsubmit="login(event)">
        <div class="input-group">
          <i class="fa-regular fa-user"></i>
          <input type="text" id="loginUser" placeholder="Username" autocomplete="username" required/>
        </div>
        <div class="input-group">
          <i class="fa-solid fa-lock"></i>
          <input type="password" id="loginPass" placeholder="Password" autocomplete="current-password" required/>
          <button type="button" class="eye-toggle" onclick="togglePass('loginPass', this)">
            <i class="fa-regular fa-eye"></i>
          </button>
        </div>
        <div class="form-options">
          <label class="remember-me"><input type="checkbox" id="rememberMe"/> Remember me</label>
        </div>
        <button type="submit" class="btn-primary">Sign In <i class="fa-solid fa-arrow-right"></i></button>
        <div id="loginError" class="form-error hidden"></div>
      </form>

      <!-- SIGNUP FORM -->
      <form id="signupTab" class="auth-form" onsubmit="signup(event)">
        <div class="input-group">
          <i class="fa-regular fa-user"></i>
          <input type="text" id="signupUser" placeholder="Choose Username" required/>
        </div>
        <div class="input-group">
          <i class="fa-regular fa-envelope"></i>
          <input type="email" id="signupEmail" placeholder="Email Address" required/>
        </div>
        <div class="input-group">
          <i class="fa-solid fa-lock"></i>
          <input type="password" id="signupPass" placeholder="Create Password" required/>
          <button type="button" class="eye-toggle" onclick="togglePass('signupPass', this)">
            <i class="fa-regular fa-eye"></i>
          </button>
        </div>
        <div class="password-strength" id="strengthBar">
          <div class="strength-fill" id="strengthFill"></div>
        </div>
        <p class="strength-label" id="strengthLabel"></p>
        <button type="submit" class="btn-primary">Create Account <i class="fa-solid fa-arrow-right"></i></button>
        <div id="signupError" class="form-error hidden"></div>
      </form>

    </div>

    <p class="auth-footer">Built with ☁️ for final year project · SkyPulse v2.0</p>
  </div>

  <script src="auth.js"></script>
</body>
</html>
